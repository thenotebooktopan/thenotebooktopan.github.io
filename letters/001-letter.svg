<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 1300" width="1000" height="1300">
  <rect width="1000" height="1300" fill="#fbf6 ea"/>
  <rect width="1000" height="1300" fill="#fbf6ea"/>
  <g stroke="#d8cdb4" stroke-width="1.4" opacity="0.7">
    <line x1="90" y1="300" x2="910" y2="300"/>
    <line x1="90" y1="372" x2="910" y2="372"/>
    <line x1="90" y1="444" x2="910" y2="444"/>
    <line x1="90" y1="516" x2="910" y2="516"/>
    <line x1="90" y1="588" x2="910" y2="588"/>
    <line x1="90" y1="660" x2="910" y2="660"/>
    <line x1="90" y1="732" x2="910" y2="732"/>
    <line x1="90" y1="804" x2="910" y2="804"/>
    <line x1="90" y1="876" x2="910" y2="876"/>
    <line x1="90" y1="948" x2="910" y2="948"/>
  </g>
  <line x1="150" y1="120" x2="150" y2="1180" stroke="#e7b3b0" stroke-width="1.6" opacity="0.6"/>
  <g font-family="'Bradley Hand','Segoe Script','Snell Roundhand',cursive" fill="#26306a">
    <text x="760" y="200" font-size="30" fill="#6a6450">June 2026</text>
    <text x="120" y="290" font-size="42">My dearest Pan,</text>
    <text x="120" y="365" font-size="34">I started a notebook today. I know you</text>
    <text x="120" y="437" font-size="34">always loved that film — Noah and his</text>
    <text x="120" y="509" font-size="34">letters, every single day. I can't promise</text>
    <text x="120" y="581" font-size="34">every day. But every once in a while, when</text>
    <text x="120" y="653" font-size="34">the missing gets loud, I'll draw you a flower</text>
    <text x="120" y="725" font-size="34">and write you a page, and leave it here.</text>
    <text x="120" y="797" font-size="34">One day you'll find all of them at once.</text>
    <text x="120" y="869" font-size="34">I hope it feels like being remembered.</text>
    <text x="640" y="985" font-size="36">— Always, K</text>
  </g>
</svg>
