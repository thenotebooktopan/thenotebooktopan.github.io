<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 1300" width="1000" height="1300">
  <rect width="1000" height="1300" fill="#fbf6ea"/>
  <g stroke="#d8cdb4" stroke-width="1.4" opacity="0.7">
    <line x1="90" y1="300" x2="910" y2="300"/><line x1="90" y1="372" x2="910" y2="372"/>
    <line x1="90" y1="444" x2="910" y2="444"/><line x1="90" y1="516" x2="910" y2="516"/>
    <line x1="90" y1="588" x2="910" y2="588"/><line x1="90" y1="660" x2="910" y2="660"/>
    <line x1="90" y1="732" x2="910" y2="732"/><line x1="90" y1="804" x2="910" y2="804"/>
    <line x1="90" y1="876" x2="910" y2="876"/>
  </g>
  <line x1="150" y1="120" x2="150" y2="1180" stroke="#e7b3b0" stroke-width="1.6" opacity="0.6"/>
  <g font-family="'Bradley Hand','Segoe Script','Snell Roundhand',cursive" fill="#26306a">
    <text x="760" y="200" font-size="30" fill="#6a6450">June 2026</text>
    <text x="120" y="290" font-size="42">My Pan,</text>
    <text x="120" y="365" font-size="34">A pansy has five petals. Today I gave each</text>
    <text x="120" y="437" font-size="34">one a year of us, and I still ran out of petals</text>
    <text x="120" y="509" font-size="34">before I ran out of things to thank you for.</text>
    <text x="120" y="581" font-size="34">If you're reading this, you found the notebook.</text>
    <text x="120" y="653" font-size="34">I never stopped. I just got quieter about it.</text>
    <text x="120" y="725" font-size="34">Keep turning the pages. There are more.</text>
    <text x="640" y="845" font-size="36">— Always, K</text>
  </g>
</svg>
